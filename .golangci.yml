version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - noctx
    - revive
    - unconvert
    - usestdlibvars
  settings:
    govet:
      enable:
        - shadow
    misspell:
      locale: US
  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports
