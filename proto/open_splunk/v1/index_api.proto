syntax = "proto3";

package open_splunk.v1;

import "google/protobuf/field_mask.proto";
import "open_splunk/v1/common.proto";
import "open_splunk/v1/index.proto";
import "open_splunk/v1/result.proto";

option go_package = "github.com/Suhaibinator/open-splunk/gen/go/open_splunk/v1;opensplunkv1";

// POST /api/v1/indexes/create
message CreateIndexRequest {
  IndexDefinition definition = 1;
  optional string client_request_id = 2;
}

message CreateIndexResponse {
  Index index = 1;
}

// POST /api/v1/indexes/get
message GetIndexRequest {
  IndexSelector selector = 1;
}

message GetIndexResponse {
  Index index = 1;
}

enum IndexSortBy {
  INDEX_SORT_BY_UNSPECIFIED = 0;
  INDEX_SORT_BY_NAME = 1;
  INDEX_SORT_BY_CREATED_AT = 2;
  INDEX_SORT_BY_UPDATED_AT = 3;
  INDEX_SORT_BY_EVENT_COUNT = 4;
  INDEX_SORT_BY_STORAGE_BYTES = 5;
}

// POST /api/v1/indexes/list
message ListIndexesRequest {
  PageRequest page = 1;
  repeated IndexState state_filters = 2;
  optional string text_filter = 3;
  IndexSortBy sort_by = 4;
  SortDirection sort_direction = 5;
  bool include_stats = 6;
}

message IndexListItem {
  Index index = 1;
  optional IndexStats stats = 2;
}

message ListIndexesResponse {
  repeated IndexListItem indexes = 1;
  PageResponse page = 2;
}

// POST /api/v1/indexes/update
message UpdateIndexRequest {
  IndexSelector selector = 1;
  uint64 expected_version = 2;
  IndexDefinition definition = 3;
  google.protobuf.FieldMask update_mask = 4;
}

message UpdateIndexResponse {
  Index index = 1;
}

// POST /api/v1/indexes/state/set
message SetIndexStateRequest {
  IndexSelector selector = 1;
  uint64 expected_version = 2;
  IndexState state = 3;
}

message SetIndexStateResponse {
  Index index = 1;
}

enum IndexDataDeletionMode {
  INDEX_DATA_DELETION_MODE_UNSPECIFIED = 0;
  INDEX_DATA_DELETION_MODE_KEEP_DATA = 1;
  INDEX_DATA_DELETION_MODE_DELETE_DATA = 2;
}

// POST /api/v1/indexes/delete
message DeleteIndexRequest {
  IndexSelector selector = 1;
  uint64 expected_version = 2;
  IndexDataDeletionMode data_deletion_mode = 3;
  string confirmation_name = 4;
}

message DeleteIndexResponse {
  string index_id = 1;
  optional string deletion_operation_id = 2;
}

// POST /api/v1/indexes/stats/get
message GetIndexStatsRequest {
  IndexSelector selector = 1;
}

message GetIndexStatsResponse {
  IndexStats stats = 1;
}

// POST /api/v1/indexes/fields/list
message ListIndexFieldsRequest {
  IndexSelector selector = 1;
  TimeRangeSpec time_range = 2;
  PageRequest page = 3;
  optional string name_filter = 4;
}

message ListIndexFieldsResponse {
  repeated FieldProfile fields = 1;
  PageResponse page = 2;
}
