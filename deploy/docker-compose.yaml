name: open-splunk

services:
  clickhouse:
    # Current tested LTS patch. Do not replace this with latest/lts: schema
    # migrations depend on the production JSON type and GA native text index.
    image: clickhouse/clickhouse-server:26.3.17.4
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: open_splunk
      CLICKHOUSE_USER: open_splunk
      CLICKHOUSE_PASSWORD: "${OPEN_SPLUNK_CLICKHOUSE_PASSWORD:?run ./generate-env.sh before docker compose up}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      # Local development never listens on every host interface. Override only
      # the host-side port if the default is already occupied.
      - "127.0.0.1:${OPEN_SPLUNK_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${OPEN_SPLUNK_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ../migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          clickhouse-client
          --host 127.0.0.1
          --user "$${CLICKHOUSE_USER}"
          --password "$${CLICKHOUSE_PASSWORD}"
          --query "SELECT 1"
          >/dev/null
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse-data:
  clickhouse-logs:
